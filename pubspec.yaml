name: mizansir
description: "Mizan Sir - HSC ICT Learning App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.3.0

  # Dependency Injection
  get_it: ^7.7.0

  # Networking
  http: ^1.2.2
  connectivity_plus: ^6.0.5

  # Local Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # JSON Serialization
  json_annotation: ^4.9.0
  dartz: ^0.10.1

  # Image Loading
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Utils
  uuid: ^4.5.1
  logger: ^2.5.0
  intl: ^0.19.0
  url_launcher: ^6.3.0

  # Video Player
  youtube_player_flutter: ^9.1.1
  flutter_launcher_icons: ^0.14.4
  package_info_plus: any
  nb_utils: any
  awesome_dialog: any
  internet_connection_checker: ^1.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  change_app_package_name: ^1.5.0

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
